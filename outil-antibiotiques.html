<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antibiotiques — RéaApp CH Robert Boulin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>

    /* ── Supabase/RéaApp additions ── */
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
    :root {
      --bg:#0b0f14;--surface:#121820;--card:#181f28;--border:#1e2a38;
      --text:#e2eaf4;--muted:#5a7080;--soft:#2a3a4a;
      --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
      --accent:#2dd4bf;--medical:#3b82f6;--urgent:#ef4444;
      --warn:#eab308;--purple:#a78bfa;--success:#22c55e;--orange:#fb923c;
    }
    html,body{background:var(--bg)!important;color:var(--text)!important;font-family:var(--font)!important}
    /* Data source badge */
    .ds-badge{padding:3px 9px;border-radius:20px;font-size:10px;font-family:var(--mono);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
    .ds-badge.supabase{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:#22c55e}
    .ds-badge.fallback{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.2);color:#eab308}
    .ds-badge.loading{background:rgba(90,112,128,.1);border:1px solid rgba(90,112,128,.2);color:#5a7080}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:10px;height:10px;border:1.5px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}


    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0b0f14;
      --surface:#121820;
      --card:#181f28;
      --border:#1e2a38;
      --text:#e2eaf4;
      --muted:#5a7080;
      --soft:#2a3a4a;
      --font:'DM Sans',sans-serif;
      --mono:'DM Mono',monospace;
      /* Couleurs fonctionnelles */
      --accent:#2dd4bf;
      --medical:#3b82f6;
      --urgent:#ef4444;
      --warn:#eab308;
      --purple:#a78bfa;
      --success:#22c55e;
      --orange:#fb923c;
    }
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    /* ── Header ── */
    .tool-header{
      background:var(--surface);
      border-bottom:1px solid var(--border);
      padding:16px 24px;
      display:flex;align-items:center;gap:14px;
      position:sticky;top:0;z-index:100;
    }
    .tool-header-icon{
      width:38px;height:38px;border-radius:10px;
      background:linear-gradient(135deg,rgba(45,212,191,.15),rgba(59,130,246,.1));
      border:1px solid rgba(45,212,191,.25);
      display:flex;align-items:center;justify-content:center;font-size:18px;
    }
    .tool-header-title{font-size:17px;font-weight:600;color:var(--text)}
    .tool-header-sub{font-size:12px;color:var(--muted);font-family:var(--mono)}
    .tool-header-badge{
      margin-left:auto;padding:4px 10px;border-radius:20px;
      background:rgba(45,212,191,.1);border:1px solid rgba(45,212,191,.2);
      font-size:11px;color:var(--accent);font-family:var(--mono);
    }

    /* ── Layout ── */
    .tool-body{max-width:1100px;margin:0 auto;padding:24px 20px;display:grid;grid-template-columns:1fr 1fr;gap:20px;}
    @media(max-width:760px){.tool-body{grid-template-columns:1fr}}

    /* ── Card ── */
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;}
    .card-title{font-size:13px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
    .card-title::before{content:'';width:3px;height:13px;background:var(--accent);border-radius:2px;display:inline-block;}

    /* ── Mode buttons ── */
    .mode-tabs{display:flex;gap:8px;margin-bottom:18px;}
    .mode-tab{
      flex:1;padding:9px 12px;border-radius:8px;border:1px solid var(--border);
      background:transparent;color:var(--muted);font-family:var(--font);font-size:13px;font-weight:500;
      cursor:pointer;transition:all .15s;
    }
    .mode-tab.active{background:rgba(45,212,191,.12);border-color:rgba(45,212,191,.35);color:var(--accent);}
    .mode-tab:hover:not(.active){border-color:var(--soft);color:var(--text);}

    /* ── Form ── */
    .form-group{margin-bottom:14px;}
    .form-label{display:block;font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
    .form-input,.form-select{
      width:100%;padding:10px 13px;
      background:var(--surface);border:1px solid var(--border);border-radius:9px;
      color:var(--text);font-size:14px;font-family:var(--font);outline:none;
      transition:border-color .15s;appearance:none;
    }
    .form-input:focus,.form-select:focus{border-color:rgba(45,212,191,.5);}
    .form-input::placeholder{color:var(--muted);}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

    .section-divider{border:none;border-top:1px solid var(--border);margin:16px 0;}

    .info-block{
      background:rgba(45,212,191,.05);border:1px solid rgba(45,212,191,.15);
      border-radius:9px;padding:12px;margin-bottom:14px;
    }
    .info-block p:first-child{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:2px;}
    .info-block p:last-child{font-size:12px;color:var(--muted);}

    /* ── Btn ── */
    .btn-primary{
      width:100%;padding:12px;background:var(--accent);border:none;border-radius:10px;
      color:#0b0f14;font-size:15px;font-weight:600;font-family:var(--font);
      cursor:pointer;transition:all .15s;
    }
    .btn-primary:hover{opacity:.9;transform:translateY(-1px);}
    .btn-secondary{
      padding:12px 16px;background:transparent;border:1px solid var(--border);border-radius:10px;
      color:var(--muted);font-family:var(--font);font-size:14px;cursor:pointer;transition:all .15s;
    }
    .btn-secondary:hover{border-color:var(--soft);color:var(--text);}
    .btn-row{display:flex;gap:10px;margin-top:4px;}
    .btn-row .btn-primary{flex:1;}

    /* ── Résultats ── */
    .results-empty{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      height:100%;min-height:280px;gap:12px;color:var(--muted);
    }
    .results-empty-icon{font-size:40px;opacity:.3;}
    .results-empty-text{font-size:13px;font-family:var(--mono);}

    .result-block{animation:fadeUp .3s ease;}

    /* Badge fonction rénale */
    .fr-badge{
      border-radius:10px;padding:16px;margin-bottom:14px;
      border:1px solid;
    }
    .fr-badge.normal{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.2);}
    .fr-badge.legere{background:rgba(45,212,191,.08);border-color:rgba(45,212,191,.2);}
    .fr-badge.moderee{background:rgba(234,179,8,.08);border-color:rgba(234,179,8,.2);}
    .fr-badge.severe{background:rgba(251,146,60,.08);border-color:rgba(251,146,60,.2);}
    .fr-badge.terminale{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);}
    .fr-badge.eer{background:rgba(167,139,250,.08);border-color:rgba(167,139,250,.2);}
    .fr-label{font-size:11px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
    .fr-value{font-size:28px;font-weight:700;line-height:1.1;}
    .fr-value.normal{color:#22c55e;}
    .fr-value.legere{color:var(--accent);}
    .fr-value.moderee{color:var(--warn);}
    .fr-value.severe{color:var(--orange);}
    .fr-value.terminale{color:var(--urgent);}
    .fr-value.eer{color:var(--purple);}
    .fr-sub{font-size:12px;color:var(--muted);margin-top:2px;}

    /* Posologie principale */
    .dose-card{
      background:linear-gradient(135deg,rgba(45,212,191,.08),rgba(59,130,246,.05));
      border:1px solid rgba(45,212,191,.2);border-radius:10px;padding:16px;margin-bottom:12px;
    }
    .dose-molecule{font-size:20px;font-weight:700;color:var(--text);margin-bottom:2px;}
    .dose-classe{font-size:12px;font-family:var(--mono);color:var(--accent);}
    .dose-indication{
      background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.15);
      border-radius:7px;padding:8px 12px;margin:10px 0;
      font-size:12px;color:var(--medical);font-family:var(--mono);
    }
    .dose-value{
      background:var(--surface);border:1px solid var(--border);
      border-radius:8px;padding:12px;
      font-size:16px;font-weight:600;color:var(--text);
    }
    .dose-value-label{font-size:11px;font-family:var(--mono);color:var(--muted);margin-bottom:4px;text-transform:uppercase;}

    /* Précautions */
    .prec-item{
      padding:10px 0 10px 14px;border-left:3px solid;margin-bottom:8px;
    }
    .prec-item.prep{border-color:var(--medical);}
    .prec-item.admin{border-color:var(--success);}
    .prec-item.stab{border-color:var(--purple);}
    .prec-item.incomp{border-color:var(--urgent);background:rgba(239,68,68,.04);padding:10px;border-radius:0 7px 7px 0;}
    .prec-item.effi{border-color:var(--accent);}
    .prec-item.tol{border-color:var(--orange);background:rgba(251,146,60,.04);padding:10px;border-radius:0 7px 7px 0;}
    .prec-item.inter{border-color:var(--warn);}
    .prec-title{font-size:11px;font-weight:600;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
    .prec-item.prep .prec-title{color:var(--medical);}
    .prec-item.admin .prec-title{color:var(--success);}
    .prec-item.stab .prec-title{color:var(--purple);}
    .prec-item.incomp .prec-title{color:var(--urgent);}
    .prec-item.effi .prec-title{color:var(--accent);}
    .prec-item.tol .prec-title{color:var(--orange);}
    .prec-item.inter .prec-title{color:var(--warn);}
    .prec-text{font-size:13px;color:var(--text);}

    /* Avertissement */
    .disclaimer{
      background:rgba(234,179,8,.06);border:1px solid rgba(234,179,8,.15);
      border-radius:10px;padding:14px 16px;margin-top:14px;
      font-size:12px;color:var(--muted);
    }
    .disclaimer strong{color:var(--warn);}

    /* select optgroup */
    optgroup{background:var(--surface);color:var(--muted);}
    option{background:var(--card);color:var(--text);}

    /* hidden */
    .hidden{display:none!important;}
  
  </style>
</head>
<body>
<!-- Header -->
  <header class="tool-header">
    <div class="tool-header-icon">💊</div>
    <div>
      <div class="tool-header-title">Antibiotiques en Réanimation</div>
      <div class="tool-header-sub">CH Robert Boulin — Adaptation posologique</div>
    </div>
    <div class="ds-badge loading" id="data-badge"><div class="spinner"></div><span>Chargement…</span></div>
    <div class="tool-header-badge" id="mol-count-badge">44 molécules</div>
  </header>

  <!-- Body -->
  <div class="tool-body">

    <!-- Colonne gauche : formulaire -->
    <div>
      <div class="card">
        <div class="card-title">Paramètres Patient</div>

        <!-- Mode tabs -->
        <div class="mode-tabs">
          <button class="mode-tab active" id="btnModeCalcul" onclick="switchMode('calcul')">📐 Calculer ClCr</button>
          <button class="mode-tab" id="btnModeDirect" onclick="switchMode('direct')">⌨️ Saisie directe</button>
        </div>

        <!-- Mode Calcul -->
        <div id="modeCalcul">
          <div class="info-block">
            <p>Méthode de référence</p>
            <p>Récolte urinaire 24h (mesurée)</p>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Volume (mL)</label>
              <input type="number" id="volU" placeholder="1500" class="form-input">
            </div>
            <div class="form-group">
              <label class="form-label">Durée</label>
              <select id="duree" class="form-select">
                <option value="12">12h</option>
                <option value="24" selected>24h</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Créat U (μmol/L)</label>
              <input type="number" id="creatU" placeholder="4420" class="form-input">
            </div>
            <div class="form-group">
              <label class="form-label">Créat P (μmol/L)</label>
              <input type="number" id="creatP" placeholder="110" class="form-input">
            </div>
          </div>
        </div>

        <!-- Mode Direct -->
        <div id="modeDirect" class="hidden">
          <div class="info-block" style="background:rgba(34,197,94,.05);border-color:rgba(34,197,94,.15);">
            <p style="color:var(--success)">Clairance du laboratoire</p>
            <p>Résultat direct mesuré</p>
          </div>
          <div class="form-group">
            <label class="form-label">Clairance mesurée (mL/min)</label>
            <input type="number" id="clcrDirect" placeholder="ex: 65" step="0.1" class="form-input" style="font-size:18px;font-weight:600;">
          </div>
        </div>

        <hr class="section-divider">

        <!-- EER -->
        <div class="form-group">
          <label class="form-label">Épuration Extra-Rénale</label>
          <select id="dialyse" class="form-select">
            <option value="non">Aucune</option>
            <option value="hdi">HDI — Hémodialyse Intermittente</option>
            <option value="eerc">EERC — CVVH / CVVHDF</option>
          </select>
        </div>

        <hr class="section-divider">

        <!-- Antibiotique -->
        <div class="form-group">
          <label class="form-label">Antibiotique</label>
          <select id="atb" class="form-select" onchange="updateIndications()">
            <option value="">— Sélectionner —</option>
            <optgroup label="Pénicillines">
              <option value="amoxicilline">Amoxicilline</option>
              <option value="amoxicilline-clavulanique">Amoxicilline + Clavulanique</option>
              <option value="piperacilline">Pipéracilline</option>
              <option value="piperacilline-tazobactam">Pipéracilline + Tazobactam</option>
              <option value="cloxacilline">Cloxacilline</option>
              <option value="penicillineG">Pénicilline G</option>
              <option value="temocilline">Témocilline</option>
              <option value="ticarcilline">Ticarcilline</option>
            </optgroup>
            <optgroup label="Céphalosporines">
              <option value="cefazoline">Céfazoline (C1G)</option>
              <option value="cefotaxime">Céfotaxime (C3G)</option>
              <option value="ceftriaxone">Ceftriaxone (C3G)</option>
              <option value="ceftazidime">Ceftazidime (C3G)</option>
              <option value="ceftazidime-avibactam">Ceftazidime + Avibactam</option>
              <option value="ceftolozane-tazobactam">Ceftolozane + Tazobactam</option>
              <option value="cefepime">Céfépime (C4G)</option>
              <option value="ceftaroline">Ceftaroline (C5G)</option>
              <option value="ceftobiprole">Ceftobiprole (C5G)</option>
              <option value="cefiderocol">Céfidérocol (Sidérophore)</option>
            </optgroup>
            <optgroup label="Carbapénèmes">
              <option value="ertapenem">Ertapénem</option>
              <option value="imipenem">Imipénem</option>
              <option value="imipenem-relebactam">Imipénem + Relebactam</option>
              <option value="meropenem">Méropénem</option>
              <option value="meropenem-vaborbactam">Méropénem + Vaborbactam</option>
            </optgroup>
            <optgroup label="Monobactame">
              <option value="aztreonam">Aztréonam</option>
            </optgroup>
            <optgroup label="Glycopeptides">
              <option value="vancomycine">Vancomycine</option>
              <option value="dalbavancine">Dalbavancine</option>
            </optgroup>
            <optgroup label="Aminosides">
              <option value="amikacine">Amikacine</option>
              <option value="gentamicine">Gentamicine</option>
              <option value="tobramycine">Tobramycine</option>
            </optgroup>
            <optgroup label="Fluoroquinolones">
              <option value="ciprofloxacine">Ciprofloxacine</option>
              <option value="levofloxacine">Lévofloxacine</option>
              <option value="ofloxacine">Ofloxacine</option>
            </optgroup>
            <optgroup label="Oxazolidinones">
              <option value="linezolide">Linézolide</option>
              <option value="tedizolide">Tédizolide</option>
            </optgroup>
            <optgroup label="Autres">
              <option value="colistine">Colistine</option>
              <option value="daptomycine">Daptomycine</option>
              <option value="clindamycine">Clindamycine</option>
              <option value="metronidazole">Métronidazole</option>
              <option value="cotrimoxazole">Cotrimoxazole</option>
              <option value="fosfomycine">Fosfomycine</option>
              <option value="rifampicine">Rifampicine</option>
              <option value="tigecycline">Tigécycline</option>
              <option value="erythromycine">Érythromycine</option>
              <option value="spiramycine">Spiramycine</option>
            </optgroup>
          </select>
        </div>

        <!-- Indication -->
        <div class="form-group">
          <label class="form-label">Type d'infection</label>
          <select id="indication" class="form-select">
            <option value="severe">Infection sévère</option>
            <option value="peusevere">Infection peu sévère</option>
          </select>
        </div>

        <div class="btn-row">
          <button class="btn-primary" onclick="calculer()">Calculer la posologie</button>
          <button class="btn-secondary" onclick="resetForm()">↺</button>
        </div>
      </div>
    </div>

    <!-- Colonne droite : résultats -->
    <div id="results-col">
      <div class="card" style="height:100%;min-height:300px;display:flex;align-items:center;justify-content:center;" id="results-empty">
        <div class="results-empty">
          <div class="results-empty-icon">💊</div>
          <div class="results-empty-text">Renseignez les paramètres</div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px;">puis cliquez sur Calculer</div>
        </div>
      </div>
      <div id="results-content" class="hidden"></div>
    </div>

  </div>
  <script>

  // ══════════════════════════════════════════════════════════
  // SUPABASE CONFIG
  // Pour modifier les posologies : Dashboard Supabase → antibiotiques_indications
  // ══════════════════════════════════════════════════════════
  const SUPABASE_URL  = 'https://mvcidplmvqaokftoszex.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12Y2lkcGxtdnFhb2tmdG9zemV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzk4MTUsImV4cCI6MjA4ODk1NTgxNX0.MiQoOve99hax2yEDq8cVpnD3GoK19cp6nb1I5xDGDzY';

  // La DB locale originale sera stockée dans DB_FALLBACK après que la DB soit initialisée
  let DB_FALLBACK = null;
  let dataSource  = 'fallback';

  async function loadFromSupabase() {
    // Sauvegarder la DB locale comme fallback
    DB_FALLBACK = Object.assign({}, DB);

    try {
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

      const { data: mols, error: e1 } = await sb
        .from('antibiotiques_molecules')
        .select('*').eq('actif', true).order('groupe').order('nom');
      if (e1) throw e1;

      const { data: inds, error: e2 } = await sb
        .from('antibiotiques_indications')
        .select('*').eq('actif', true).order('ordre');
      if (e2) throw e2;

      if (!mols || mols.length === 0) throw new Error('Aucune molécule');

      // Reconstruire DB depuis Supabase
      const newDB = {};
      const indByMol = {};
      for (const ind of inds) {
        if (!indByMol[ind.molecule_id]) indByMol[ind.molecule_id] = [];
        indByMol[ind.molecule_id].push(ind);
      }
      for (const mol of mols) {
        const indications = {};
        for (const ind of (indByMol[mol.id] || [])) {
          indications[ind.slug] = {
            n:   ind.pos_normale   || 'NC',
            l:   ind.pos_legere    || 'NC',
            m:   ind.pos_moderee   || 'NC',
            s:   ind.pos_severe    || 'NC',
            t:   ind.pos_terminale || 'NC',
            hdi: ind.pos_hdi       || 'NC',
            eerc:ind.pos_eerc      || 'NC',
          };
          if (ind.label) NOMS_INDICATIONS[ind.slug] = ind.label;
        }
        newDB[mol.slug] = {
          nom:mol.nom, classe:mol.classe, groupe:mol.groupe,
          prep:mol.prep, admin:mol.admin, stab:mol.stab,
          incomp:mol.incomp, effi:mol.effi, tol:mol.tol, inter:mol.inter,
          indications,
        };
      }

      // Mettre à jour DB et select
      Object.assign(DB, newDB);
      // Supprimer les slugs absents de Supabase
      for (const k of Object.keys(DB)) { if (!newDB[k]) delete DB[k]; }

      dataSource = 'supabase';

      const badge = document.getElementById('data-badge');
      badge.className = 'ds-badge supabase';
      badge.innerHTML = '<span>&#9679; Supabase</span>';
      document.getElementById('mol-count-badge').textContent = mols.length + ' molécules';

      rebuildSelectFromSupabase(mols);
      console.log('Supabase OK:', mols.length, 'molécules,', inds.length, 'indications');

    } catch(err) {
      console.warn('Supabase indispo → fallback local', err.message || err);
      const badge = document.getElementById('data-badge');
      badge.className = 'ds-badge fallback';
      badge.innerHTML = '<span>&#9889; Local</span>';
    }
  }

  function rebuildSelectFromSupabase(mols) {
    const sel = document.getElementById('atb');
    const cur = sel.value;
    const ORDER = ['Pénicillines','Céphalosporines','Carbapénèmes','Monobactame',
                   'Glycopeptides','Aminosides','Fluoroquinolones','Oxazolidinones','Autres'];
    const byG = {};
    mols.forEach(m => {
      const g = ORDER.includes(m.groupe) ? m.groupe : 'Autres';
      if (!byG[g]) byG[g] = [];
      byG[g].push(m);
    });
    sel.innerHTML = '<option value="">— Sélectionner —</option>';
    for (const g of ORDER) {
      if (!byG[g]) continue;
      const og = document.createElement('optgroup');
      og.label = g;
      byG[g].forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.slug; opt.textContent = m.nom;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    }
    if (cur && DB[cur]) sel.value = cur;
    updateIndications();
  }

  // ══════════════════════════════════════════════════════════
  // LOGIQUE APPLICATIVE
  // ══════════════════════════════════════════════════════════

  let currentMode = 'calcul';

  function switchMode(mode) {
    currentMode = mode;
    document.getElementById('btnModeCalcul').classList.toggle('active', mode === 'calcul');
    document.getElementById('btnModeDirect').classList.toggle('active', mode === 'direct');
    document.getElementById('modeCalcul').classList.toggle('hidden', mode !== 'calcul');
    document.getElementById('modeDirect').classList.toggle('hidden', mode !== 'direct');
  }

  function updateIndications() {
    const atb = document.getElementById('atb').value;
    const sel = document.getElementById('indication');
    const current = sel.value;
    sel.innerHTML = '';
    const indications = (atb && INDICATIONS_PAR_ATB[atb]) 
      ? INDICATIONS_PAR_ATB[atb] 
      : ['severe', 'peusevere'];
    indications.forEach(ind => {
      const opt = document.createElement('option');
      opt.value = ind;
      opt.textContent = NOMS_INDICATIONS[ind] || ind;
      sel.appendChild(opt);
    });
    if (indications.includes(current)) sel.value = current;
  }

  function getStade(clcr) {
    if (clcr >= 90) return { code: 'n', label: 'Normale', cl: 'normal', css: 'normal' };
    if (clcr >= 60) return { code: 'l', label: 'Légèrement diminuée', cl: 'legere', css: 'legere' };
    if (clcr >= 30) return { code: 'm', label: 'Modérément diminuée', cl: 'moderee', css: 'moderee' };
    if (clcr >= 15) return { code: 's', label: 'Sévèrement diminuée', cl: 'severe', css: 'severe' };
    return { code: 't', label: 'Terminale / Dialyse', cl: 'terminale', css: 'terminale' };
  }

  function calculer() {
    const atb = document.getElementById('atb').value;
    const indication = document.getElementById('indication').value;
    const dialyse = document.getElementById('dialyse').value;

    if (!atb) {
      alert('Veuillez sélectionner un antibiotique');
      return;
    }

    let clcr = 0;
    if (dialyse === 'non') {
      if (currentMode === 'direct') {
        clcr = parseFloat(document.getElementById('clcrDirect').value);
        if (!clcr || clcr <= 0) { alert('Saisir la clairance'); return; }
      } else {
        const vol = parseFloat(document.getElementById('volU').value);
        const duree = parseFloat(document.getElementById('duree').value);
        const creatU = parseFloat(document.getElementById('creatU').value);
        const creatP = parseFloat(document.getElementById('creatP').value);
        if (!vol || !creatU || !creatP) { alert('Remplir tous les champs'); return; }
        clcr = (vol / 1000 * creatU) / (duree * 60 * creatP / 1000);
      }
    }

    const d = DB[atb];
    if (!d) { alert('Molécule non trouvée'); return; }

    const st = getStade(clcr);
    const dosageMap = d.indications[indication] || d.indications['severe'] || {};

    let pos = '', eerc_pos = '', hdi_pos = '';
    if (dialyse === 'eerc') {
      eerc_pos = dosageMap.eerc || 'NC — Consulter pharmacien';
    } else if (dialyse === 'hdi') {
      hdi_pos = dosageMap.hdi || 'NC — Consulter pharmacien';
    } else {
      pos = dosageMap[st.code] || 'NC — Consulter pharmacien';
    }

    // Affichage
    document.getElementById('results-empty').classList.add('hidden');
    document.getElementById('results-content').classList.remove('hidden');
    document.getElementById('results-content').innerHTML = buildResult(d, st, clcr, dialyse, pos, eerc_pos, hdi_pos, indication);
    document.getElementById('results-content').style.animation = 'none';
    requestAnimationFrame(() => { document.getElementById('results-content').style.animation = 'fadeUp .3s ease'; });
  }

  function buildResult(d, st, clcr, dialyse, pos, eerc_pos, hdi_pos, indication) {
    // Bloc fonction rénale
    let frBlock = '';
    if (dialyse === 'eerc') {
      frBlock = `<div class="fr-badge eer"><div class="fr-label">Épuration Extra-Rénale</div><div class="fr-value eer">EERC Active</div><div class="fr-sub">CVVH / CVVHDF — Clairance native non pertinente</div></div>`;
    } else if (dialyse === 'hdi') {
      frBlock = `<div class="fr-badge eer"><div class="fr-label">Épuration Extra-Rénale</div><div class="fr-value eer">HDI Active</div><div class="fr-sub">Hémodialyse Intermittente — Administrer après séance</div></div>`;
    } else {
      frBlock = `<div class="fr-badge ${st.css}">
        <div class="fr-label">Clairance rénale mesurée</div>
        <div class="fr-value ${st.css}">${clcr.toFixed(1)} <span style="font-size:16px;font-weight:400">mL/min</span></div>
        <div class="fr-sub">${st.label}</div>
      </div>`;
    }

    // Bloc posologie
    let doseBlock = '';
    if (dialyse === 'eerc') {
      doseBlock = `<div class="dose-value" style="border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.05);">
        <div class="dose-value-label" style="color:var(--purple)">⚠️ Posologie EERC</div>
        ${eerc_pos}
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px;padding:8px;background:rgba(251,146,60,.06);border-radius:6px;">
        ℹ️ Utiliser UNIQUEMENT la posologie EERC ci-dessus
      </div>`;
    } else if (dialyse === 'hdi') {
      doseBlock = `<div class="dose-value" style="border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.05);">
        <div class="dose-value-label" style="color:var(--purple)">⚠️ Posologie HDI</div>
        ${hdi_pos}
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px;padding:8px;background:rgba(251,146,60,.06);border-radius:6px;">
        ℹ️ Administrer APRÈS la séance d'hémodialyse (sauf mention contraire)
      </div>`;
    } else {
      doseBlock = `<div class="dose-value">
        <div class="dose-value-label">Posologie adaptée (ClCr ${clcr.toFixed(1)} mL/min)</div>
        ${pos}
      </div>`;
    }

    return `
      <div class="card result-block" style="margin-bottom:14px;">
        <div class="card-title">Fonction Rénale</div>
        ${frBlock}
      </div>

      <div class="card result-block" style="margin-bottom:14px;">
        <div class="card-title">Posologie Recommandée</div>
        <div class="dose-card">
          <div class="dose-molecule">${d.nom}</div>
          <div class="dose-classe">${d.classe}</div>
        </div>
        <div class="dose-indication">📋 ${NOMS_INDICATIONS[indication] || indication}</div>
        ${doseBlock}
      </div>

      <div class="card result-block" style="margin-bottom:14px;">
        <div class="card-title">Précautions d'Emploi</div>
        <div class="prec-item prep"><div class="prec-title">Préparation</div><div class="prec-text">${d.prep}</div></div>
        <div class="prec-item admin"><div class="prec-title">Administration</div><div class="prec-text">${d.admin}</div></div>
        <div class="prec-item stab"><div class="prec-title">Stabilité</div><div class="prec-text">${d.stab}</div></div>
        <div class="prec-item incomp"><div class="prec-title">⚠️ Incompatibilités</div><div class="prec-text">${d.incomp}</div></div>
        <div class="prec-item effi"><div class="prec-title">Surveillance Efficacité</div><div class="prec-text">${d.effi}</div></div>
        <div class="prec-item tol"><div class="prec-title">⚠️ Surveillance Tolérance</div><div class="prec-text">${d.tol}</div></div>
        <div class="prec-item inter"><div class="prec-title">Interactions</div><div class="prec-text">${d.inter}</div></div>
      </div>

      <div class="disclaimer">
        <strong>⚠️ Avertissement</strong> — Aide à la décision uniquement. Ne remplace pas le jugement clinique. Consulter infectiologue/pharmacien si doute.
        <br>Sources : Adaptation Antibiotiques CH Robert Boulin · GPR · OMEDIT · SPILF/SFAR/SRLF
      </div>
    `;
  }

  function resetForm() {
    document.getElementById('volU').value = '';
    document.getElementById('creatU').value = '';
    document.getElementById('creatP').value = '';
    document.getElementById('clcrDirect').value = '';
    document.getElementById('atb').value = '';
    document.getElementById('dialyse').value = 'non';
    updateIndications();
    document.getElementById('results-empty').classList.remove('hidden');
    document.getElementById('results-content').classList.add('hidden');
  }

  // Init
  document.getElementById('volU').value = '1500';
  document.getElementById('creatU').value = '4420';
  document.getElementById('creatP').value = '110';
  document.getElementById('atb').value = 'vancomycine';
  updateIndications();

  // Charger depuis Supabase (fallback local si indispo)
  loadFromSupabase();

  </script>
